    <style>
        /* Staff page specific styles */
        .staff-container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 25px;
            display: flex;
            flex-direction: column;
            gap: 40px;
        }
        
        .staff-tier {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 25px;
            margin-bottom: 20px;
        }
        
        .tier-label {
            width: 100%;
            text-align: center;
            color: var(--primary);
            font-size: clamp(1.2rem, 5vw, 1.8rem);
            margin-bottom: 25px;
            position: relative;
            font-weight: 600;
        }
        
        .tier-label:after {
            content: '';
            position: absolute;
            width: clamp(100px, 50%, 200px);
            height: 3px;
            background: linear-gradient(90deg, var(--primary), var(--primary-dark));
            bottom: -8px;
            left: 50%;
            transform: translateX(-50%);
            border-radius: 3px;
            animation: linePulse 2s infinite alternate;
        }
        
        @keyframes linePulse {
            0% {
                opacity: 0.7;
                width: clamp(100px, 50%, 200px);
            }
            100% {
                opacity: 1;
                width: clamp(120px, 55%, 220px);
            }
        }
        
        .staff-card {
            background: var(--glass);
            border-radius: 8px;
            width: clamp(160px, 30vw, 240px);
            padding: 20px;
            text-align: center;
            transition: all 0.3s ease;
            border-top: 3px solid var(--primary);
            backdrop-filter: blur(5px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            position: relative;
            overflow: hidden;
            transform: translateY(20px);
            opacity: 0;
            animation: cardAppear 0.5s forwards;
        }
        
        @keyframes cardAppear {
            to {
                transform: translateY(0);
                opacity: 1;
            }
        }
        
        .staff-tier:nth-child(1) .staff-card { animation-delay: 0.1s; }
        .staff-tier:nth-child(2) .staff-card:nth-child(1) { animation-delay: 0.2s; }
        .staff-tier:nth-child(2) .staff-card:nth-child(2) { animation-delay: 0.3s; }
        .staff-tier:nth-child(2) .staff-card:nth-child(3) { animation-delay: 0.4s; }
        
        .staff-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(0,204,255,0.1) 0%, rgba(0,204,255,0) 70%);
            animation: cardGlow 6s infinite linear;
            z-index: 0;
        }
        
        @keyframes cardGlow {
            0% {
                transform: rotate(0deg) translate(-30%, -30%);
            }
            100% {
                transform: rotate(360deg) translate(-30%, -30%);
            }
        }
        
        .staff-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0, 204, 255, 0.3);
        }
        
        .staff-card img {
            width: clamp(80px, 20vw, 120px);
            height: clamp(80px, 20vw, 120px);
            object-fit: cover;
            border-radius: 50%;
            border: 3px solid var(--primary);
            margin-bottom: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            position: relative;
            z-index: 1;
            transition: all 0.3s ease;
        }
        
        .staff-card:hover img {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(0, 204, 255, 0.5);
        }
        
        .staff-role {
            color: var(--primary);
            font-weight: 700;
            font-size: clamp(0.9rem, 3vw, 1.1rem);
            margin-bottom: 5px;
            position: relative;
            z-index: 1;
        }
        
        .staff-name {
            font-size: clamp(0.8rem, 2.5vw, 1rem);
            font-weight: 500;
            position: relative;
            z-index: 1;
        }
        
        /* Owner Card */
        .owner-card {
            width: clamp(220px, 60vw, 320px);
            border-top-width: 4px;
            border-top-color: var(--gold);
            box-shadow: 0 0 25px rgba(0, 204, 255, 0.5);
            animation: ownerGlow 3s infinite alternate;
        }
        
        @keyframes ownerGlow {
            0% {
                box-shadow: 0 0 25px rgba(0, 204, 255, 0.5);
            }
            100% {
                box-shadow: 0 0 40px rgba(0, 204, 255, 0.8);
            }
        }
        
        .owner-card img {
            width: clamp(100px, 25vw, 150px);
            height: clamp(100px, 25vw, 150px);
            border-width: 4px;
        }
        
        /* FIB Staff */
        .fib-staff .staff-card {
            border-top-color: var(--secondary);
        }
        
        .fib-staff .staff-card::before {
            background: radial-gradient(circle, rgba(255,51,102,0.1) 0%, rgba(255,51,102,0) 70%);
        }
        
        .fib-staff .staff-card:hover {
            box-shadow: 0 10px 25px rgba(255, 51, 102, 0.3);
        }
        
        .fib-staff .staff-card img {
            border-color: var(--secondary);
        }
        
        .fib-staff .staff-card:hover img {
            box-shadow: 0 0 20px rgba(255, 51, 102, 0.5);
        }
        
        .fib-staff .staff-role {
            color: var(--secondary);
        }
        
        /* EMS Staff */
        .ems-staff .staff-card {
            border-top-color: var(--gta-pink);
        }
        
        .ems-staff .staff-card::before {
            background: radial-gradient(circle, rgba(250,2,113,0.1) 0%, rgba(250,2,113,0) 70%);
        }
        
        .ems-staff .staff-card:hover {
            box-shadow: 0 10px 25px rgba(250, 2, 113, 0.3);
        }
        
        .ems-staff .staff-card img {
            border-color: var(--gta-pink);
        }
        
        .ems-staff .staff-card:hover img {
            box-shadow: 0 0 20px rgba(250, 2, 113, 0.5);
        }
        
        .ems-staff .staff-role {
            color: var(--gta-pink);
        }
    </style>
